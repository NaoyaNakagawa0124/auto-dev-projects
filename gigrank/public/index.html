<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigRank - Rate Concerts With Friends</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        h1 {
            font-size: 48px; font-weight: 900; text-align: center; margin: 40px 0 8px;
            background: linear-gradient(135deg, #ff4444, #ff8800, #ffcc00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #666; margin-bottom: 40px; font-size: 16px; }

        .card {
            background: #14141e; border: 1px solid #222; border-radius: 16px;
            padding: 24px; margin-bottom: 16px;
        }
        .card h2 { font-size: 20px; margin-bottom: 16px; color: #ddd; }

        input, button { font-family: 'Inter', sans-serif; font-size: 14px; }
        input[type="text"], input[type="date"] {
            width: 100%; padding: 12px 16px; border-radius: 8px;
            border: 1px solid #333; background: #0a0a0f; color: #fff;
            margin-bottom: 12px;
        }
        input:focus { outline: none; border-color: #ff4444; }

        .btn {
            padding: 12px 24px; border-radius: 8px; border: none;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff4444, #ff8800);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,68,68,0.3); }
        .btn-secondary { background: #222; color: #aaa; }
        .btn-secondary:hover { background: #333; }

        .btn-row { display: flex; gap: 8px; }

        .join-code {
            font-family: monospace; font-size: 32px; font-weight: 900;
            color: #ff8800; text-align: center; padding: 16px;
            background: #1a1a2e; border-radius: 12px; letter-spacing: 8px;
            margin: 12px 0;
        }

        .member-list { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
        .member-tag {
            background: #1a1a2e; padding: 6px 14px; border-radius: 20px;
            font-size: 13px; color: #aaa;
        }

        .gig-card {
            background: #1a1a2e; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent;
        }
        .gig-card:hover { border-color: #ff4444; }
        .gig-card .artist { font-size: 18px; font-weight: 700; }
        .gig-card .venue { color: #888; font-size: 13px; }
        .gig-card .score-badge {
            float: right; background: linear-gradient(135deg, #ff4444, #ff8800);
            padding: 6px 14px; border-radius: 8px; font-weight: 700; font-size: 18px;
        }

        .slider-group { margin: 12px 0; }
        .slider-label {
            display: flex; justify-content: space-between;
            font-size: 13px; color: #aaa; margin-bottom: 4px;
        }
        .slider-label .value { color: #ff8800; font-weight: 700; font-size: 16px; }
        input[type="range"] {
            width: 100%; height: 6px; -webkit-appearance: none;
            background: #222; border-radius: 3px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: #ff4444; cursor: pointer;
        }

        .radar-container { max-width: 400px; margin: 20px auto; }

        .hidden { display: none; }

        .toast {
            position: fixed; top: 20px; right: 20px; background: #1a1a2e;
            border: 1px solid #ff4444; border-radius: 12px; padding: 12px 20px;
            z-index: 100; opacity: 0; transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }

        textarea {
            width: 100%; padding: 12px; border-radius: 8px;
            border: 1px solid #333; background: #0a0a0f; color: #fff;
            font-family: 'Inter', sans-serif; resize: vertical; min-height: 60px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Landing -->
        <div id="landing">
            <h1>GigRank</h1>
            <p class="subtitle">Rate concerts with friends. Compare your vibes.</p>

            <div class="card">
                <h2>Create a Gig Group</h2>
                <input type="text" id="create-name" placeholder="Group name (e.g. 'Summer Tour Crew')">
                <input type="text" id="create-username" placeholder="Your name">
                <button class="btn btn-primary" onclick="createGroup()">Create Group</button>
            </div>

            <div class="card">
                <h2>Join a Group</h2>
                <input type="text" id="join-code" placeholder="Enter 6-character code" maxlength="6" style="text-transform:uppercase">
                <input type="text" id="join-username" placeholder="Your name">
                <button class="btn btn-primary" onclick="joinGroup()">Join</button>
            </div>
        </div>

        <!-- Group Dashboard -->
        <div id="dashboard" class="hidden">
            <h1 id="group-name"></h1>
            <div class="join-code" id="group-code"></div>
            <p class="subtitle">Share this code with friends to join</p>

            <div class="card">
                <h2>Members</h2>
                <div class="member-list" id="members"></div>
            </div>

            <div class="card">
                <h2>Add a Gig</h2>
                <input type="text" id="gig-artist" placeholder="Artist / Band">
                <input type="text" id="gig-venue" placeholder="Venue">
                <input type="date" id="gig-date">
                <button class="btn btn-primary" onclick="addGig()">Add Gig</button>
            </div>

            <div id="gigs-list">
                <h2 style="margin: 24px 0 12px;">Gigs</h2>
            </div>
        </div>

        <!-- Gig Detail -->
        <div id="gig-detail" class="hidden">
            <button class="btn btn-secondary" onclick="showDashboard()" style="margin-bottom: 16px;">← Back</button>
            <div class="card">
                <h2 id="detail-artist"></h2>
                <p id="detail-venue" style="color:#888"></p>
                <p id="detail-date" style="color:#666;font-size:13px"></p>
            </div>

            <div class="card">
                <h2>Your Rating</h2>
                <div id="rating-sliders"></div>
                <textarea id="rating-comment" placeholder="Any thoughts? (optional)"></textarea>
                <button class="btn btn-primary" onclick="submitRating()">Submit Rating</button>
            </div>

            <div class="card">
                <h2>Group Comparison</h2>
                <div class="radar-container">
                    <canvas id="radar-chart"></canvas>
                </div>
            </div>

            <div id="all-ratings" class="card hidden">
                <h2>All Ratings</h2>
                <div id="ratings-list"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
</body>
</html>
