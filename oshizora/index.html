<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推し空 - Oshizora</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: #0a0a1a;
  font-family: 'Zen Maru Gothic', sans-serif;
  color: #fff;
  cursor: default;
  user-select: none;
}

canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
}

/* ─── Overlay UI ─────────────────────────────── */
.overlay {
  position: fixed;
  z-index: 10;
  pointer-events: none;
}

.top-info {
  top: 20px; left: 20px;
  opacity: 0.8;
  transition: opacity 0.5s;
}

.top-info:hover { opacity: 1; }

.oshi-name {
  font-size: 28px;
  font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  letter-spacing: 2px;
}

.oshi-sub {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 2px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

.weather-info {
  bottom: 80px; left: 20px;
  font-size: 12px;
  opacity: 0.5;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

.message-box {
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  font-size: 15px;
  opacity: 0;
  transition: opacity 2s;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  max-width: 80vw;
}

.message-box.show { opacity: 0.8; }

.settings-btn {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 20;
  width: 40px; height: 40px;
  border: none;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  pointer-events: auto;
  transition: all 0.3s;
}

.settings-btn:hover {
  background: rgba(255,255,255,0.25);
  transform: scale(1.1);
}

/* ─── Setup Modal ────────────────────────────── */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 100;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}

.modal-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: rgba(30,30,50,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 32px;
  width: 360px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal h2 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
}

.modal .subtitle {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
}

.form-input:focus {
  border-color: rgba(255,255,255,0.3);
}

.form-input::placeholder {
  color: rgba(255,255,255,0.3);
}

.color-picker-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.color-input {
  width: 50px; height: 40px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  cursor: pointer;
  background: none;
  padding: 2px;
}

.color-input::-webkit-color-swatch-wrapper { padding: 0; }
.color-input::-webkit-color-swatch { border: none; border-radius: 8px; }

.color-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}

.color-preset {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
}

.color-preset:hover { transform: scale(1.15); }
.color-preset.active { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

.save-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
  margin-top: 8px;
}

.save-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }

/* ─── Time badge ─────────────────────────────── */
.time-badge {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-size: 36px;
  font-weight: 700;
  opacity: 0.3;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  letter-spacing: 4px;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="sky"></canvas>

<!-- Top Info -->
<div class="overlay top-info">
  <div class="oshi-name" id="oshi-display"></div>
  <div class="oshi-sub" id="oshi-sub">の空</div>
</div>

<!-- Time -->
<div class="time-badge" id="time-badge"></div>

<!-- Weather Info -->
<div class="overlay weather-info" id="weather-info"></div>

<!-- Message -->
<div class="overlay message-box" id="message-box"></div>

<!-- Settings Button -->
<button class="settings-btn" id="settings-btn">⚙</button>

<!-- Setup Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>推し空へようこそ</h2>
    <p class="subtitle">推しの色に染まる、あなただけの空</p>

    <div class="form-group">
      <label class="form-label">推しの名前</label>
      <input type="text" class="form-input" id="input-name" placeholder="例: 初音ミク、推しの名前...">
    </div>

    <div class="form-group">
      <label class="form-label">推しカラー</label>
      <div class="color-picker-row">
        <input type="color" class="color-input" id="input-color" value="#39C5BB">
        <div class="color-presets" id="color-presets"></div>
      </div>
    </div>

    <button class="save-btn" id="save-btn">この空を見る</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  推し空 (Oshizora) - Main Script
// ═══════════════════════════════════════════════════

const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');

// ─── Config ────────────────────────────────────────
let config = {
  oshiName: '',
  oshiColor: '#39C5BB',
  lat: 35.6762,  // Tokyo default
  lon: 139.6503,
};

// ─── Weather State ─────────────────────────────────
let weather = {
  temp: 15,
  code: 0,        // WMO weather code
  isDay: true,
  windSpeed: 5,
  humidity: 50,
  description: '晴れ',
  loaded: false,
};

// ─── Preset Colors (popular oshi colors) ───────────
const presetColors = [
  { color: '#39C5BB', label: 'ミクグリーン' },
  { color: '#FF69B4', label: 'ピンク' },
  { color: '#FFD700', label: 'ゴールド' },
  { color: '#FF4444', label: 'レッド' },
  { color: '#4169E1', label: 'ロイヤルブルー' },
  { color: '#9B59B6', label: 'パープル' },
  { color: '#FF8C00', label: 'オレンジ' },
  { color: '#2ECC71', label: 'グリーン' },
  { color: '#E91E63', label: 'ローズ' },
  { color: '#00BCD4', label: 'シアン' },
];

// ─── Particles ─────────────────────────────────────
const particles = [];
const MAX_PARTICLES = 120;

// ─── Stars ─────────────────────────────────────────
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    size: Math.random() * 2 + 0.5,
    twinkle: Math.random() * Math.PI * 2,
    speed: 0.5 + Math.random() * 2,
  });
}

// ─── Clouds ────────────────────────────────────────
const clouds = [];
for (let i = 0; i < 8; i++) {
  clouds.push({
    x: Math.random() * 2 - 0.5,
    y: 0.05 + Math.random() * 0.35,
    width: 0.15 + Math.random() * 0.2,
    height: 0.03 + Math.random() * 0.04,
    speed: 0.00003 + Math.random() * 0.00005,
    opacity: 0.3 + Math.random() * 0.4,
  });
}

// ─── Messages ──────────────────────────────────────
const messages = {
  morning: [
    'おはよう。{name}も今日、きっと頑張ってる。',
    '朝の空が{name}の色に染まっている。',
    '新しい一日。{name}と同じ空の下で。',
    '朝露のように、今日も輝いて。',
  ],
  day: [
    '{name}も今、同じ空を見ているかも。',
    '青空に{name}の色が溶けていく。',
    'いい天気。{name}のことを想う昼下がり。',
    '空を見上げるたび、{name}を思い出す。',
  ],
  evening: [
    '夕焼けが{name}の色に変わる時間。',
    '一日お疲れさま。{name}もきっと。',
    '夕暮れの空は、{name}への想いの色。',
    'また明日も、この空の下で。',
  ],
  night: [
    '{name}と同じ星空の下にいる。',
    '静かな夜。{name}のことを想う。',
    '星が{name}の色に瞬いている。',
    'おやすみ。{name}も良い夢を。',
  ],
  rain: [
    '雨の日も、{name}の色は消えない。',
    '雨粒が{name}の色を映している。',
    '雨上がりの空を、一緒に待とう。',
  ],
  snow: [
    '雪が{name}の色に染まって降る。',
    '静かな雪の夜。{name}のことを想う。',
    '白い世界にも、{name}の色がある。',
  ],
};

// ─── Time & Season Helpers ─────────────────────────
function getTimeOfDay() {
  const h = new Date().getHours();
  if (h >= 5 && h < 7) return 'dawn';
  if (h >= 7 && h < 16) return 'day';
  if (h >= 16 && h < 19) return 'dusk';
  return 'night';
}

function getSeason() {
  const m = new Date().getMonth();
  if (m >= 2 && m <= 4) return 'spring';
  if (m >= 5 && m <= 7) return 'summer';
  if (m >= 8 && m <= 10) return 'autumn';
  return 'winter';
}

function getWeatherType() {
  const code = weather.code;
  if (code >= 71 && code <= 77) return 'snow';
  if (code >= 80 && code <= 99) return 'rain';
  if (code >= 61 && code <= 67) return 'rain';
  if (code >= 51 && code <= 57) return 'drizzle';
  if (code >= 45 && code <= 48) return 'fog';
  if (code >= 2 && code <= 3) return 'cloudy';
  if (code === 1) return 'partly_cloudy';
  return 'clear';
}

// ─── Color Helpers ─────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function lerpColor(c1, c2, t) {
  return {
    r: Math.round(c1.r + (c2.r - c1.r) * t),
    g: Math.round(c1.g + (c2.g - c1.g) * t),
    b: Math.round(c1.b + (c2.b - c1.b) * t),
  };
}

function rgbStr(c, a = 1) {
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

// Sky gradient colors for each time of day
function getSkyColors(oshiRgb) {
  const tod = getTimeOfDay();
  const wt = getWeatherType();

  let top, mid, bottom;

  switch (tod) {
    case 'dawn':
      top = { r: 40, g: 30, b: 80 };
      mid = lerpColor({ r: 200, g: 120, b: 80 }, oshiRgb, 0.3);
      bottom = lerpColor({ r: 255, g: 180, b: 100 }, oshiRgb, 0.2);
      break;
    case 'day':
      top = lerpColor({ r: 80, g: 140, b: 220 }, oshiRgb, 0.15);
      mid = lerpColor({ r: 140, g: 190, b: 240 }, oshiRgb, 0.2);
      bottom = lerpColor({ r: 200, g: 220, b: 245 }, oshiRgb, 0.1);
      break;
    case 'dusk':
      top = lerpColor({ r: 40, g: 40, b: 100 }, oshiRgb, 0.15);
      mid = lerpColor({ r: 200, g: 100, b: 80 }, oshiRgb, 0.35);
      bottom = lerpColor({ r: 255, g: 150, b: 60 }, oshiRgb, 0.25);
      break;
    case 'night':
      top = lerpColor({ r: 8, g: 8, b: 30 }, oshiRgb, 0.08);
      mid = lerpColor({ r: 15, g: 15, b: 50 }, oshiRgb, 0.12);
      bottom = lerpColor({ r: 25, g: 20, b: 60 }, oshiRgb, 0.15);
      break;
  }

  // Cloudy/rainy desaturation
  if (wt === 'cloudy' || wt === 'rain' || wt === 'drizzle' || wt === 'fog') {
    const gray = { r: 130, g: 130, b: 140 };
    const amount = wt === 'rain' ? 0.4 : wt === 'fog' ? 0.5 : 0.25;
    top = lerpColor(top, gray, amount);
    mid = lerpColor(mid, gray, amount);
    bottom = lerpColor(bottom, gray, amount);
  }

  return { top, mid, bottom };
}

// ─── Particle System ───────────────────────────────
function spawnSeasonalParticles() {
  const season = getSeason();
  const wt = getWeatherType();

  // Weather particles (rain/snow) override seasonal
  if (wt === 'rain' || wt === 'drizzle') {
    if (particles.length < MAX_PARTICLES && Math.random() < 0.3) {
      particles.push({
        type: 'rain',
        x: Math.random() * canvas.width,
        y: -10,
        vx: -1 + Math.random() * -2,
        vy: 8 + Math.random() * 6,
        life: 1,
        size: 1 + Math.random() * 2,
      });
    }
    return;
  }

  if (wt === 'snow' || (season === 'winter' && wt === 'clear')) {
    if (particles.length < MAX_PARTICLES && Math.random() < 0.12) {
      const oshiRgb = hexToRgb(config.oshiColor);
      particles.push({
        type: 'snow',
        x: Math.random() * canvas.width,
        y: -10,
        vx: Math.sin(Date.now() * 0.001 + Math.random() * 10) * 0.5,
        vy: 0.5 + Math.random() * 1.5,
        life: 1,
        size: 2 + Math.random() * 4,
        color: lerpColor({ r: 255, g: 255, b: 255 }, oshiRgb, 0.15 + Math.random() * 0.1),
      });
    }
    return;
  }

  const oshiRgb = hexToRgb(config.oshiColor);

  switch (season) {
    case 'spring':
      // Cherry blossom petals
      if (particles.length < MAX_PARTICLES && Math.random() < 0.08) {
        particles.push({
          type: 'petal',
          x: Math.random() * canvas.width * 1.2 - canvas.width * 0.1,
          y: -20,
          vx: 0.3 + Math.random() * 0.8,
          vy: 0.5 + Math.random() * 1.2,
          life: 1,
          size: 4 + Math.random() * 6,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: 0.02 + Math.random() * 0.04,
          color: lerpColor({ r: 255, g: 200, b: 210 }, oshiRgb, 0.2),
          wobble: Math.random() * Math.PI * 2,
        });
      }
      break;

    case 'summer':
      // Fireflies at dusk/night
      if ((getTimeOfDay() === 'dusk' || getTimeOfDay() === 'night') &&
          particles.length < 40 && Math.random() < 0.03) {
        particles.push({
          type: 'firefly',
          x: Math.random() * canvas.width,
          y: canvas.height * 0.4 + Math.random() * canvas.height * 0.5,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.3,
          life: 1,
          maxLife: 200 + Math.random() * 300,
          age: 0,
          size: 3 + Math.random() * 3,
          color: lerpColor({ r: 255, g: 255, b: 150 }, oshiRgb, 0.3),
        });
      }
      break;

    case 'autumn':
      // Falling leaves
      if (particles.length < MAX_PARTICLES && Math.random() < 0.06) {
        const leafColors = [
          lerpColor({ r: 220, g: 120, b: 30 }, oshiRgb, 0.2),
          lerpColor({ r: 200, g: 60, b: 30 }, oshiRgb, 0.2),
          lerpColor({ r: 180, g: 150, b: 40 }, oshiRgb, 0.2),
        ];
        particles.push({
          type: 'leaf',
          x: Math.random() * canvas.width * 1.2,
          y: -20,
          vx: 0.5 + Math.random() * 1.0,
          vy: 0.8 + Math.random() * 1.5,
          life: 1,
          size: 6 + Math.random() * 8,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: 0.01 + Math.random() * 0.03,
          color: leafColors[Math.floor(Math.random() * leafColors.length)],
          wobble: Math.random() * Math.PI * 2,
        });
      }
      break;
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    switch (p.type) {
      case 'rain':
        p.x += p.vx;
        p.y += p.vy;
        if (p.y > canvas.height) { particles.splice(i, 1); continue; }
        break;

      case 'snow':
        p.x += p.vx + Math.sin(Date.now() * 0.002 + i) * 0.3;
        p.y += p.vy;
        if (p.y > canvas.height + 10) { particles.splice(i, 1); continue; }
        break;

      case 'petal':
        p.wobble += 0.02;
        p.x += p.vx + Math.sin(p.wobble) * 0.8;
        p.y += p.vy + Math.cos(p.wobble * 0.7) * 0.3;
        p.rotation += p.rotSpeed;
        if (p.y > canvas.height + 20) { particles.splice(i, 1); continue; }
        break;

      case 'leaf':
        p.wobble += 0.015;
        p.x += p.vx + Math.sin(p.wobble) * 1.2;
        p.y += p.vy + Math.cos(p.wobble * 0.5) * 0.5;
        p.rotation += p.rotSpeed;
        if (p.y > canvas.height + 20) { particles.splice(i, 1); continue; }
        break;

      case 'firefly':
        p.age++;
        p.vx += (Math.random() - 0.5) * 0.05;
        p.vy += (Math.random() - 0.5) * 0.05;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.x += p.vx;
        p.y += p.vy;
        p.life = Math.sin(p.age / p.maxLife * Math.PI);
        if (p.age > p.maxLife) { particles.splice(i, 1); continue; }
        break;
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();

    switch (p.type) {
      case 'rain': {
        const oshiRgb = hexToRgb(config.oshiColor);
        const rainColor = lerpColor({ r: 180, g: 200, b: 230 }, oshiRgb, 0.1);
        ctx.strokeStyle = rgbStr(rainColor, 0.4);
        ctx.lineWidth = p.size * 0.5;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + p.vx * 2, p.y + p.vy * 2);
        ctx.stroke();
        break;
      }

      case 'snow':
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = rgbStr(p.color || { r: 255, g: 255, b: 255 });
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        // Glow
        ctx.globalAlpha = 0.2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'petal':
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = rgbStr(p.color);
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        // Inner highlight
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(-p.size * 0.2, -p.size * 0.1, p.size * 0.4, p.size * 0.2, 0, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'leaf':
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = rgbStr(p.color);
        // Leaf shape
        ctx.beginPath();
        ctx.moveTo(0, -p.size);
        ctx.quadraticCurveTo(p.size, -p.size * 0.3, 0, p.size);
        ctx.quadraticCurveTo(-p.size, -p.size * 0.3, 0, -p.size);
        ctx.fill();
        // Vein
        ctx.strokeStyle = rgbStr(lerpColor(p.color, { r: 0, g: 0, b: 0 }, 0.2), 0.3);
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(0, -p.size);
        ctx.lineTo(0, p.size);
        ctx.stroke();
        break;

      case 'firefly':
        ctx.globalAlpha = p.life * 0.8;
        // Glow
        const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
        gradient.addColorStop(0, rgbStr(p.color, 0.6));
        gradient.addColorStop(1, rgbStr(p.color, 0));
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
        ctx.fill();
        // Core
        ctx.globalAlpha = p.life;
        ctx.fillStyle = rgbStr(p.color);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
        break;
    }

    ctx.restore();
  }
}

// ─── Main Render ───────────────────────────────────
function render() {
  const W = canvas.width = window.innerWidth;
  const H = canvas.height = window.innerHeight;

  const oshiRgb = hexToRgb(config.oshiColor);
  const skyColors = getSkyColors(oshiRgb);
  const tod = getTimeOfDay();

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, rgbStr(skyColors.top));
  grad.addColorStop(0.5, rgbStr(skyColors.mid));
  grad.addColorStop(1, rgbStr(skyColors.bottom));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Oshi color aura at horizon
  const auraGrad = ctx.createRadialGradient(W / 2, H * 0.7, 0, W / 2, H * 0.7, W * 0.6);
  auraGrad.addColorStop(0, rgbStr(oshiRgb, 0.08));
  auraGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = auraGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars (night/dusk only)
  if (tod === 'night' || tod === 'dusk') {
    const starAlpha = tod === 'night' ? 0.8 : 0.3;
    const t = Date.now() * 0.001;
    for (const star of stars) {
      const twinkle = (Math.sin(t * star.speed + star.twinkle) + 1) * 0.5;
      ctx.globalAlpha = starAlpha * twinkle;
      ctx.fillStyle = rgbStr(lerpColor({ r: 255, g: 255, b: 255 }, oshiRgb, 0.2));
      ctx.beginPath();
      ctx.arc(star.x * W, star.y * H * 0.7, star.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Sun or Moon
  if (tod === 'day' || tod === 'dawn' || tod === 'dusk') {
    // Sun
    const sunX = W * (tod === 'dawn' ? 0.2 : tod === 'dusk' ? 0.8 : 0.5);
    const sunY = tod === 'day' ? H * 0.15 : H * 0.45;
    const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 80);
    const sunColor = lerpColor({ r: 255, g: 240, b: 200 }, oshiRgb, 0.1);
    sunGrad.addColorStop(0, rgbStr(sunColor, 0.9));
    sunGrad.addColorStop(0.3, rgbStr(sunColor, 0.3));
    sunGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 80, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Moon
    const moonX = W * 0.75;
    const moonY = H * 0.15;
    const moonColor = lerpColor({ r: 220, g: 230, b: 255 }, oshiRgb, 0.15);
    ctx.fillStyle = rgbStr(moonColor, 0.9);
    ctx.beginPath();
    ctx.arc(moonX, moonY, 25, 0, Math.PI * 2);
    ctx.fill();
    // Moon glow
    const moonGlow = ctx.createRadialGradient(moonX, moonY, 25, moonX, moonY, 80);
    moonGlow.addColorStop(0, rgbStr(moonColor, 0.15));
    moonGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = moonGlow;
    ctx.beginPath();
    ctx.arc(moonX, moonY, 80, 0, Math.PI * 2);
    ctx.fill();
  }

  // Clouds
  const wt = getWeatherType();
  const cloudCount = (wt === 'cloudy' || wt === 'rain') ? 8 : (wt === 'partly_cloudy' ? 5 : 3);
  for (let i = 0; i < cloudCount; i++) {
    const cloud = clouds[i % clouds.length];
    cloud.x += cloud.speed;
    if (cloud.x > 1.3) cloud.x = -0.3;

    const cx = cloud.x * W;
    const cy = cloud.y * H;
    const cw = cloud.width * W;
    const ch = cloud.height * H;

    ctx.globalAlpha = cloud.opacity * (tod === 'night' ? 0.3 : 0.7);
    const cloudColor = lerpColor({ r: 240, g: 240, b: 245 }, oshiRgb, 0.05);
    ctx.fillStyle = rgbStr(cloudColor);

    // Multi-circle cloud
    for (let j = 0; j < 5; j++) {
      const ox = cw * (j / 5 - 0.1);
      const oy = Math.sin(j * 1.2) * ch * 0.3;
      const r = ch * (0.8 + Math.sin(j * 2) * 0.3);
      ctx.beginPath();
      ctx.arc(cx + ox, cy + oy, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Seasonal particles
  spawnSeasonalParticles();
  updateParticles();
  drawParticles();

  // Ground silhouette
  ctx.fillStyle = rgbStr(lerpColor({ r: 20, g: 20, b: 30 }, oshiRgb, 0.05), tod === 'night' ? 0.8 : 0.15);
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 20) {
    const y = H - 30 + Math.sin(x * 0.005) * 15 + Math.sin(x * 0.01 + 2) * 8;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.fill();

  requestAnimationFrame(render);
}

// ─── Weather Fetch ─────────────────────────────────
async function fetchWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${config.lat}&longitude=${config.lon}&current=temperature_2m,weather_code,is_day,wind_speed_10m,relative_humidity_2m&timezone=auto`;
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;
    weather.temp = Math.round(c.temperature_2m);
    weather.code = c.weather_code;
    weather.isDay = c.is_day === 1;
    weather.windSpeed = c.wind_speed_10m;
    weather.humidity = c.relative_humidity_2m;
    weather.loaded = true;
    weather.description = describeWeather(c.weather_code);
    updateWeatherDisplay();
  } catch (e) {
    console.log('Weather fetch failed, using defaults');
    weather.description = '取得中...';
  }
}

function describeWeather(code) {
  if (code === 0) return '快晴';
  if (code <= 3) return '晴れ';
  if (code <= 48) return '曇り';
  if (code <= 57) return '霧雨';
  if (code <= 67) return '雨';
  if (code <= 77) return '雪';
  if (code <= 82) return 'にわか雨';
  if (code <= 86) return 'にわか雪';
  if (code <= 99) return '雷雨';
  return '不明';
}

// ─── UI Updates ────────────────────────────────────
function updateWeatherDisplay() {
  const el = document.getElementById('weather-info');
  el.textContent = `${weather.description} ${weather.temp}°C | 風速 ${weather.windSpeed}km/h | 湿度 ${weather.humidity}%`;
}

function updateTimeDisplay() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  document.getElementById('time-badge').textContent = `${h}:${m}`;
}

function showMessage() {
  const tod = getTimeOfDay();
  const wt = getWeatherType();

  let pool;
  if (wt === 'rain' || wt === 'drizzle') pool = messages.rain;
  else if (wt === 'snow') pool = messages.snow;
  else if (tod === 'dawn' || (tod === 'day' && new Date().getHours() < 10)) pool = messages.morning;
  else if (tod === 'day') pool = messages.day;
  else if (tod === 'dusk') pool = messages.evening;
  else pool = messages.night;

  const msg = pool[Math.floor(Math.random() * pool.length)].replace('{name}', config.oshiName || '推し');
  const el = document.getElementById('message-box');
  el.textContent = msg;
  el.classList.add('show');

  setTimeout(() => el.classList.remove('show'), 8000);
}

// ─── Geolocation ───────────────────────────────────
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        config.lat = pos.coords.latitude;
        config.lon = pos.coords.longitude;
        saveConfig();
        fetchWeather();
      },
      () => fetchWeather() // Use default (Tokyo)
    );
  } else {
    fetchWeather();
  }
}

// ─── Config Persistence ────────────────────────────
function saveConfig() {
  localStorage.setItem('oshizora-config', JSON.stringify(config));
}

function loadConfig() {
  const saved = localStorage.getItem('oshizora-config');
  if (saved) {
    Object.assign(config, JSON.parse(saved));
    return true;
  }
  return false;
}

// ─── Modal ─────────────────────────────────────────
function initModal() {
  const modal = document.getElementById('modal');
  const colorInput = document.getElementById('input-color');
  const nameInput = document.getElementById('input-name');
  const presetsEl = document.getElementById('color-presets');
  const saveBtn = document.getElementById('save-btn');
  const settingsBtn = document.getElementById('settings-btn');

  // Populate presets
  presetColors.forEach(pc => {
    const el = document.createElement('div');
    el.className = 'color-preset';
    el.style.background = pc.color;
    el.title = pc.label;
    el.addEventListener('click', () => {
      colorInput.value = pc.color;
      document.querySelectorAll('.color-preset').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      updateSaveBtn(pc.color);
    });
    presetsEl.appendChild(el);
  });

  colorInput.addEventListener('input', () => {
    document.querySelectorAll('.color-preset').forEach(p => p.classList.remove('active'));
    updateSaveBtn(colorInput.value);
  });

  function updateSaveBtn(color) {
    saveBtn.style.background = `linear-gradient(135deg, ${color}, ${color}cc)`;
  }

  function openModal() {
    nameInput.value = config.oshiName;
    colorInput.value = config.oshiColor;
    updateSaveBtn(config.oshiColor);
    // Highlight matching preset
    document.querySelectorAll('.color-preset').forEach(p => {
      p.classList.toggle('active', p.style.background === colorInput.value);
    });
    modal.classList.add('show');
  }

  function closeModal() {
    modal.classList.remove('show');
  }

  saveBtn.addEventListener('click', () => {
    config.oshiName = nameInput.value.trim() || '推し';
    config.oshiColor = colorInput.value;
    saveConfig();
    applyConfig();
    closeModal();
    showMessage();
  });

  settingsBtn.addEventListener('click', openModal);

  // Show on first run
  if (!loadConfig()) {
    openModal();
    updateSaveBtn('#39C5BB');
  }
}

function applyConfig() {
  document.getElementById('oshi-display').textContent = config.oshiName || '推し';
  document.getElementById('oshi-display').style.color = config.oshiColor;
}

// ─── Init ──────────────────────────────────────────
function init() {
  loadConfig();
  initModal();
  applyConfig();

  getLocation();
  updateTimeDisplay();

  // Periodic updates
  setInterval(updateTimeDisplay, 10000);
  setInterval(fetchWeather, 600000); // 10 min
  setInterval(showMessage, 30000);

  // First message after 3 sec
  setTimeout(showMessage, 3000);

  render();
}

window.addEventListener('load', init);
</script>
