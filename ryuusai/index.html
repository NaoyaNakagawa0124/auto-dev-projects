<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流彩 — デジタル墨流しアートジェネレータ</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <h1 class="logo">流<span class="logo-accent">彩</span></h1>
        <span class="subtitle">デジタル墨流し</span>
      </div>
      <div class="header-right">
        <button id="btn-gallery" class="header-btn" title="ギャラリー">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button id="btn-auto" class="header-btn" title="自動生成モード">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </button>
      </div>
    </header>

    <!-- Main Canvas Area -->
    <main id="canvas-container">
      <div id="canvas-wrapper"></div>
      <div id="hint-overlay">
        <p>画面をクリックして墨を落とす</p>
        <p>ドラッグで流れを作る</p>
      </div>
    </main>

    <!-- Toolbar -->
    <div id="toolbar">
      <!-- Color Palette -->
      <div class="tool-section" id="palette-section">
        <div class="tool-label">墨色</div>
        <div id="color-swatches"></div>
      </div>

      <!-- Palette Selector -->
      <div class="tool-section">
        <div class="tool-label">パレット</div>
        <select id="palette-select">
          <option value="wabi">侘寂 (わびさび)</option>
          <option value="sakura">桜 (さくら)</option>
          <option value="ocean">海 (うみ)</option>
          <option value="sunset">夕焼け (ゆうやけ)</option>
          <option value="neon">ネオン</option>
          <option value="mono">墨 (すみ)</option>
        </select>
      </div>

      <!-- Brush Size -->
      <div class="tool-section">
        <div class="tool-label">墨量</div>
        <input type="range" id="brush-size" min="1" max="10" value="5" class="slider">
      </div>

      <!-- Flow Strength -->
      <div class="tool-section">
        <div class="tool-label">流れの強さ</div>
        <input type="range" id="flow-strength" min="1" max="10" value="5" class="slider">
      </div>

      <!-- Actions -->
      <div class="tool-section tool-actions">
        <button id="btn-clear" class="tool-btn" title="クリア">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/></svg>
          <span>クリア</span>
        </button>
        <button id="btn-export" class="tool-btn tool-btn-primary" title="エクスポート">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>保存</span>
        </button>
      </div>
    </div>

    <!-- Gallery Modal -->
    <div id="gallery-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>ギャラリー</h2>
          <button id="btn-close-gallery" class="modal-close">&times;</button>
        </div>
        <div id="gallery-grid"></div>
        <div id="gallery-empty" class="hidden">
          <p>まだ作品がありません</p>
          <p>墨流しを作成して保存してみましょう</p>
        </div>
      </div>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content export-content">
        <div class="modal-header">
          <h2>エクスポート</h2>
          <button id="btn-close-export" class="modal-close">&times;</button>
        </div>
        <div class="export-options">
          <div class="export-preview" id="export-preview"></div>
          <div class="export-controls">
            <div class="export-field">
              <label>解像度</label>
              <select id="export-resolution">
                <option value="1">標準 (キャンバスサイズ)</option>
                <option value="2" selected>高解像度 (2x)</option>
                <option value="4">超高解像度 (4x)</option>
              </select>
            </div>
            <div class="export-field">
              <label>背景</label>
              <select id="export-bg">
                <option value="washi">和紙風</option>
                <option value="white">白</option>
                <option value="black">黒</option>
                <option value="transparent">透明</option>
              </select>
            </div>
            <button id="btn-download" class="tool-btn tool-btn-primary export-download">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              ダウンロード (PNG)
            </button>
            <button id="btn-save-gallery" class="tool-btn export-download">
              ギャラリーに保存
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="fluid.js"></script>
  <script src="palettes.js"></script>
  <script src="gallery.js"></script>
  <script src="app.js"></script>
</body>
</html>
