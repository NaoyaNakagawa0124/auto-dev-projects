<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0e14">
  <title>副業バブル — fukugyou-bubble</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <header class="hud">
    <div class="hud-brand">
      <span class="hud-mark">¥</span>
      <div>
        <h1>副業バブル</h1>
        <p class="hud-sub">8 つの副業をクリックして ¥10,000,000 を目指す</p>
      </div>
    </div>
    <div class="hud-stats">
      <div class="stat-card">
        <span class="stat-label">手元の現金</span>
        <span class="stat-value" id="hud-cash">¥0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">放置収入</span>
        <span class="stat-value" id="hud-income">¥0/秒</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">クリック数</span>
        <span class="stat-value" id="hud-clicks">0</span>
      </div>
    </div>
  </header>

  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="progress-label" id="progress-label">¥0 / ¥10,000,000</span>
  </div>

  <main id="hustle-grid" class="hustle-grid"></main>

  <div id="viral-overlay" class="viral-overlay hidden">
    <div class="viral-banner">
      <span class="viral-tag">🔥 バズり中</span>
      <span class="viral-body" id="viral-body">…</span>
      <span class="viral-timer" id="viral-timer">30 秒</span>
    </div>
  </div>

  <div id="win-overlay" class="win-overlay hidden">
    <div class="win-card">
      <h2>🎉 副業帝国の完成</h2>
      <p>¥10,000,000 達成。あなたは副業で生きていける。</p>
      <p class="win-stats" id="win-stats"></p>
      <button id="btn-replay" class="primary">もう一度はじめる</button>
    </div>
  </div>

  <footer class="footer">
    <button id="btn-reset" class="ghost">最初からやり直す</button>
    <span class="muted">自動保存中 · localStorage</span>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
