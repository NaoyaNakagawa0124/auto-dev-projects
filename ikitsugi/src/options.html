<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>息継ぎ — 設定</title>
  <style>
    :root {
      --night: #0a0e1a;
      --amber: #f5c84a;
      --blue: #82c0ff;
      --ink: #f1ead2;
      --dim: rgba(241, 234, 210, 0.55);
      --line: rgba(255,255,255,0.08);
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--night);
      color: var(--ink);
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 56px 28px 80px;
    }
    h1 {
      font-size: 22px;
      letter-spacing: 0.2em;
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    h1::before {
      content: "";
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 14px rgba(245, 200, 74, 0.5);
    }
    .sub {
      color: var(--dim);
      letter-spacing: 0.12em;
      font-size: 12px;
      margin-bottom: 36px;
    }
    section {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.025);
      border-radius: 18px;
      padding: 20px 22px;
      margin-bottom: 18px;
    }
    section h2 {
      font-size: 11px;
      letter-spacing: 0.24em;
      color: var(--dim);
      margin: 0 0 14px;
      text-transform: uppercase;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px dashed var(--line);
    }
    .row:first-of-type { border-top: 0; padding-top: 0; }
    .row .name { color: var(--ink); }
    .row .hint { font-size: 11px; color: var(--dim); margin-top: 2px; }

    select, input[type="range"] {
      background: rgba(0,0,0,0.25);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
    }
    input[type="range"] { width: 160px; padding: 0; accent-color: var(--amber); }
    input[type="checkbox"] { accent-color: var(--amber); transform: scale(1.1); }

    .value {
      font-variant-numeric: tabular-nums;
      color: var(--amber);
      letter-spacing: 0.06em;
      min-width: 32px;
      text-align: right;
    }

    .danger {
      margin-top: 16px;
      background: transparent;
      border: 1px solid rgba(255, 120, 120, 0.4);
      color: rgba(255, 200, 200, 0.9);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      letter-spacing: 0.12em;
      cursor: pointer;
    }
    .danger:hover { background: rgba(255, 120, 120, 0.08); }

    .footnote {
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: 36px;
    }
    .saved {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(245, 200, 74, 0.12);
      color: var(--amber);
      border: 1px solid rgba(245, 200, 74, 0.32);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.18em;
      opacity: 0;
      transition: opacity 220ms, transform 220ms;
      pointer-events: none;
    }
    .saved.on { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>息継ぎ</h1>
    <div class="sub">画面の隅でそっと続く呼吸</div>

    <section>
      <h2>呼吸</h2>
      <div class="row">
        <div>
          <div class="name">パターン</div>
          <div class="hint">f448 (リラックス) / box (集中) / r478 (鎮静)</div>
        </div>
        <select id="pattern">
          <option value="f448">f448 — 4-4-8</option>
          <option value="box">box — 4-4-4-4</option>
          <option value="r478">r478 — 4-7-8</option>
        </select>
      </div>
    </section>

    <section>
      <h2>表示</h2>
      <div class="row">
        <div class="name">ドットを表示</div>
        <input type="checkbox" id="enabled" />
      </div>
      <div class="row">
        <div>
          <div class="name">位置</div>
        </div>
        <select id="position">
          <option value="bottom-right">右下</option>
          <option value="bottom-left">左下</option>
          <option value="top-right">右上</option>
          <option value="top-left">左上</option>
        </select>
      </div>
      <div class="row">
        <div>
          <div class="name">ドットの大きさ</div>
          <div class="hint">18 〜 48 px</div>
        </div>
        <div style="display:flex;gap:10px;align-items:center;">
          <input type="range" id="dot_size" min="18" max="48" step="1" />
          <span class="value" id="dot_size_val">28</span>
        </div>
      </div>
      <div class="row">
        <div class="name">フェーズのラベルを表示</div>
        <input type="checkbox" id="show_label" />
      </div>
    </section>

    <section>
      <h2>邪魔しない</h2>
      <div class="row">
        <div>
          <div class="name">フルスクリーン中は隠す</div>
          <div class="hint">ゲーム中・プレゼン中など</div>
        </div>
        <input type="checkbox" id="hide_on_fullscreen" />
      </div>
      <div class="row">
        <div>
          <div class="name">大きな動画再生中は隠す</div>
          <div class="hint">YouTube などの大画面動画を検出</div>
        </div>
        <input type="checkbox" id="hide_on_video" />
      </div>
    </section>

    <section>
      <h2>データ</h2>
      <div class="row" style="border-top:0;padding-top:0;">
        <div>
          <div class="name">統計データ</div>
          <div class="hint" id="stats-summary">— 件のセッション / — サイクル</div>
        </div>
        <button class="danger" id="reset-stats" type="button">統計をリセット</button>
      </div>
    </section>

    <div class="footnote">設定は自動保存されます。</div>
  </div>

  <div class="saved" id="saved">保存しました</div>

  <script src="options.js"></script>
</body>
</html>
