<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テンキメシ — 天気で決める今日のごはん</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  h1 {
    font-size: 1.5rem;
    color: #58a6ff;
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #8b949e;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  .controls label {
    font-size: 0.8rem;
    color: #8b949e;
  }

  .controls input, .controls select {
    background: #161b22;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    width: 100px;
  }

  .controls button {
    background: #238636;
    color: #fff;
    border: none;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    transition: background 0.2s;
  }

  .controls button:hover { background: #2ea043; }

  /* Device frame */
  .device {
    background: #1c1c1c;
    border-radius: 24px;
    padding: 18px;
    box-shadow:
      0 0 0 2px #333,
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.05);
    max-width: 640px;
    width: 100%;
  }

  .device-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .led {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #238636;
    box-shadow: 0 0 4px #238636;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .device-label {
    font-size: 0.65rem;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Screen */
  .screen {
    background: #0a0a1a;
    border-radius: 12px;
    padding: 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.5;
    min-height: 500px;
    border: 1px solid #222;
    overflow-x: auto;
  }

  .screen .header {
    text-align: center;
    border-bottom: 2px solid #30363d;
    padding-bottom: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .screen .header .title {
    font-size: 1.2rem;
    font-weight: 700;
    color: #79c0ff;
  }

  .screen .header .tagline {
    font-size: 0.75rem;
    color: #6e7681;
    margin-top: 0.25rem;
  }

  .section {
    margin: 0.75rem 0;
    padding: 0.5rem 0;
    border-bottom: 1px solid #21262d;
  }

  .section:last-child { border-bottom: none; }

  .location {
    color: #3fb950;
    font-size: 0.85rem;
  }

  .weather-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.25rem 1rem;
    margin-top: 0.5rem;
  }

  .weather-item {
    color: #e3b341;
    font-size: 0.82rem;
  }

  .recommendation {
    text-align: center;
    padding: 0.75rem 0;
  }

  .food-name {
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0.25rem 0;
  }

  .food-desc {
    color: #8b949e;
    font-size: 0.8rem;
    margin: 0.5rem 0;
  }

  .menu-list {
    list-style: none;
    padding: 0;
    margin: 0.5rem 0;
  }

  .menu-list li {
    color: #c9d1d9;
    font-size: 0.8rem;
    padding: 0.1rem 0;
  }

  .menu-list li::before {
    content: "● ";
    color: #f0883e;
  }

  .floorplan-container {
    margin-top: 0.5rem;
  }

  .floorplan-title {
    color: #3fb950;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
  }

  .floorplan {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    line-height: 1.35;
    color: #7ee787;
    white-space: pre;
    overflow-x: auto;
  }

  .footer {
    text-align: center;
    color: #484f58;
    font-size: 0.7rem;
    margin-top: 0.5rem;
  }

  .loading {
    text-align: center;
    color: #58a6ff;
    padding: 3rem;
    font-size: 1rem;
  }

  .loading .spinner {
    display: inline-block;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .error {
    color: #f85149;
    text-align: center;
    padding: 1rem;
    font-size: 0.85rem;
  }

  /* Color classes for food categories */
  .color-cyan { color: #79c0ff; }
  .color-red { color: #f85149; }
  .color-yellow { color: #e3b341; }
  .color-bright-yellow { color: #f0c000; }
  .color-bright-red { color: #ff7b72; }
  .color-blue { color: #58a6ff; }
  .color-magenta { color: #bc8cff; }
  .color-green { color: #3fb950; }

  @media (max-width: 600px) {
    body { padding: 1rem; }
    .device { padding: 12px; }
    .screen { padding: 1rem; font-size: 0.75rem; }
    .floorplan { font-size: 0.58rem; }
    .weather-grid { grid-template-columns: 1fr; }

</style>

function recommend(temp, weatherCode, windSpeed, humidity) {
  if (temp >= 30) return FOOD_CATEGORIES.cold_noodle;
  if (temp <= 5) return FOOD_CATEGORIES.hot_nabe;
  if (weatherCode >= 61) return FOOD_CATEGORIES.ramen;
  if (weatherCode >= 45 && humidity > 80) return FOOD_CATEGORIES.curry;
  if (weatherCode === 0 && temp >= 20) return FOOD_CATEGORIES.bbq;
  if (weatherCode === 0 && temp >= 10) return FOOD_CATEGORIES.sushi;
  if (weatherCode <= 3 && windSpeed > 20) return FOOD_CATEGORIES.izakaya;
  if (weatherCode >= 2 && weatherCode <= 3) return FOOD_CATEGORIES.chinese;
  if (temp < 15) return FOOD_CATEGORIES.yoshoku;
  return FOOD_CATEGORIES.cafe;
}

function getWeatherDesc(code) {
  return WEATHER_DESC[code] || `不明 (${code})`;
}

function formatTime() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const h = String(now.getHours()).padStart(2, '0');
  const mi = String(now.getMinutes()).padStart(2, '0');
  return `${y}-${m}-${d} ${h}:${mi}`;
}

// --- 画面描画 ---
function renderScreen(city, weather, food, floorplan) {
  const weatherDesc = getWeatherDesc(weather.weather_code);
  const screen = document.getElementById('screen');

  screen.innerHTML = `
    <div class="header">
      <div class="title">🌤️ テンキメシ 🍽️</div>
      <div class="tagline">天気で決める今日のごはん</div>
    </div>

    <div class="section">
      <div class="location">📍 ${city} | ${formatTime()}</div>
      <div class="weather-grid">
        <div class="weather-item">🌡️ 気温: ${weather.temp}°C</div>
        <div class="weather-item">🌧️ 天気: ${weatherDesc}</div>
        <div class="weather-item">💨 風速: ${weather.wind_speed} km/h</div>
        <div class="weather-item">💧 湿度: ${weather.humidity}%</div>
      </div>
    </div>

    <div class="section recommendation">
      <div class="food-name ${food.colorClass}">${food.emoji} 今日のおすすめ: ${food.name}</div>
      <div class="food-desc">${food.description}</div>
      <ul class="menu-list">
        ${food.examples.slice(0, 3).map(e => `<li>${e}</li>`).join('')}
      </ul>
    </div>

    <div class="section floorplan-container">
      <div class="floorplan-title">🏠 理想のお店レイアウト:</div>
      <div class="floorplan">${escapeHtml(floorplan)}</div>
    </div>

    <div class="footer">次の更新: 5分後 | 自動更新中</div>
  `;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// --- 天気取得 ---
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m&timezone=Asia/Tokyo`;
  const res = await fetch(url);
  const data = await res.json();
  return {
    temp: data.current.temperature_2m,
    weather_code: data.current.weather_code,
    wind_speed: data.current.wind_speed_10m,
    humidity: data.current.relative_humidity_2m,
  };
}

// --- メイン処理 ---
async function refresh() {
  const lat = parseFloat(document.getElementById('lat').value);
  const lon = parseFloat(document.getElementById('lon').value);
  const city = document.getElementById('city').value || '東京';

  const screen = document.getElementById('screen');
  screen.innerHTML = '<div class="loading"><span class="spinner">🍜</span> 天気データを取得中...</div>';

  try {
    const weather = await fetchWeather(lat, lon);
    const food = recommend(weather.temp, weather.weather_code, weather.wind_speed, weather.humidity);
    const floorplan = FLOORPLANS[food.name] || FLOORPLANS["ラーメン"];
    renderScreen(city, weather, food, floorplan);
  } catch (err) {
    screen.innerHTML = `<div class="error">⚠️ エラー: ${err.message}<br>天気データの取得に失敗しました。</div>`;
  }
}

// 初回読み込み & 自動更新
refresh();
setInterval(refresh, 5 * 60 * 1000);
</script>
