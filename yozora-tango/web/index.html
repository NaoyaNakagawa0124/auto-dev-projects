<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2238" />
  <title>夜空単語</title>
  <link rel="stylesheet" href="style.css" />
  <!-- p5.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.10.0/lib/p5.min.js" defer></script>
</head>
<body>
  <main class="app screen-intro" id="app">
    <!-- INTRO -->
    <section class="intro panel">
      <h1 class="brand">夜空単語</h1>
      <p class="lead">
        英単語 が 星 として 流れます。<br/>
        思い出せた と 思ったら、 <strong>思い出せた</strong> を タップ。<br/>
        星 が 点灯 し、 線 で つながり、 星座 が できます。
      </p>
      <p class="lead-soft dim">
        1 セッション 5 分。 完成 した 星座 は 残ります。
      </p>
      <button id="start-btn" class="primary-btn">今夜 を 始める</button>

      <details class="collection">
        <summary>夜空 コレクション</summary>
        <div id="collection-grid"></div>
      </details>
    </section>

    <!-- ROUND -->
    <section class="round">
      <div id="canvas-host" aria-hidden="true"></div>
      <div class="hud">
        <div class="hud-time" id="hud-time">5:00</div>
        <div class="hud-progress" id="hud-progress">
          <span class="dim">完成 した 星座</span> <strong id="hud-done">0</strong>
        </div>
      </div>
      <div class="card-overlay" id="card-overlay">
        <div class="card-hint" id="card-hint">v.</div>
        <div class="card-en" id="card-en">abandon</div>
        <div class="card-jp" id="card-jp">見捨てる</div>
      </div>
      <div class="actions">
        <button id="miss-btn"  class="ghost-btn">忘れた</button>
        <button id="hit-btn"   class="primary-btn">思い出せた</button>
      </div>
    </section>

    <!-- RESULT -->
    <section class="result panel">
      <h2 class="brand small">今夜 の 集まり</h2>
      <div id="result-summary"></div>
      <div id="result-closer" class="dim italic"></div>
      <button id="again-btn" class="ghost-btn">もう 一夜</button>
    </section>
  </main>

  <script type="module" src="app.js" defer></script>
</body>
</html>
