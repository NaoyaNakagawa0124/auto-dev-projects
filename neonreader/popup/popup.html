<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>ネオンリーダー</title>
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <h1 class="popup-title">⚡ ネオンリーダー</h1>
      <p class="popup-subtitle">サイバーパンク読書モード</p>
    </header>

    <!-- Activate Button -->
    <div class="popup-section">
      <button id="btn-activate" class="btn-primary" type="button">
        ▶ リーダーモード起動
      </button>
    </div>

    <!-- Display Settings -->
    <div class="popup-section">
      <h2 class="section-title">── 表示設定 ──</h2>

      <div class="setting-row">
        <label class="setting-label" for="range-fontsize">文字サイズ</label>
        <input type="range" id="range-fontsize" class="neon-range" min="16" max="40" step="1" value="24">
        <span class="setting-value" id="val-fontsize">24px</span>
      </div>

      <div class="setting-row">
        <label class="setting-label" for="range-lineheight">行間</label>
        <input type="range" id="range-lineheight" class="neon-range" min="1.4" max="3.0" step="0.1" value="2.0">
        <span class="setting-value" id="val-lineheight">2.0</span>
      </div>

      <div class="setting-row">
        <label class="setting-label" for="range-letterspacing">文字間隔</label>
        <input type="range" id="range-letterspacing" class="neon-range" min="0" max="0.15" step="0.01" value="0.05">
        <span class="setting-value" id="val-letterspacing">0.05em</span>
      </div>
    </div>

    <!-- Color Theme -->
    <div class="popup-section">
      <h2 class="section-title">── カラーテーマ ──</h2>

      <div class="theme-grid">
        <label class="theme-option">
          <input type="radio" name="theme" value="green" checked>
          <span class="theme-label theme-green">ネオングリーン</span>
        </label>
        <label class="theme-option">
          <input type="radio" name="theme" value="cyan">
          <span class="theme-label theme-cyan">サイバーシアン</span>
        </label>
        <label class="theme-option">
          <input type="radio" name="theme" value="amber">
          <span class="theme-label theme-amber">アンバー</span>
        </label>
        <label class="theme-option">
          <input type="radio" name="theme" value="white">
          <span class="theme-label theme-white">ホワイト</span>
        </label>
      </div>
    </div>

    <!-- Features -->
    <div class="popup-section">
      <h2 class="section-title">── 機能 ──</h2>

      <label class="checkbox-row">
        <input type="checkbox" id="chk-readingguide" checked>
        <span class="checkbox-label">読書ガイド（行ハイライト）</span>
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="chk-hud" checked>
        <span class="checkbox-label">HUD表示（文字数・読了時間）</span>
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="chk-scanlines" checked>
        <span class="checkbox-label">スキャンライン効果</span>
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="chk-typewriter" checked>
        <span class="checkbox-label">タイプライター演出</span>
      </label>
    </div>

    <!-- Shortcut -->
    <div class="popup-section popup-shortcut">
      <h2 class="section-title">── ショートカット ──</h2>
      <p class="shortcut-text">Alt+R: リーダーモード切替</p>
    </div>

    <!-- Reset -->
    <div class="popup-section">
      <button id="btn-reset" class="btn-secondary" type="button">
        設定をリセット
      </button>
    </div>
  </div>

  <script src="../shared/settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
