<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicSky</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <canvas id="weather-canvas"></canvas>

    <div id="overlay">
      <header id="header">
        <h1 id="title">CivicSky</h1>
        <div id="location-badge"></div>
        <button id="settings-btn" aria-label="Settings">&#9881;</button>
      </header>

      <div id="intensity-label"></div>

      <div id="forecast-bar"></div>

      <div id="cards-container">
        <div id="cards-list"></div>
      </div>

      <div id="category-filters"></div>
    </div>

    <div id="settings-panel" class="hidden">
      <div class="settings-inner">
        <h2>Settings</h2>
        <div class="setting-group">
          <label for="state-select">Your State</label>
          <select id="state-select"></select>
        </div>
        <div class="setting-group">
          <label>Categories</label>
          <div id="category-toggles"></div>
        </div>
        <button id="settings-close">Done</button>
      </div>
    </div>

    <div id="onboarding" class="hidden">
      <div class="onboarding-inner">
        <h2>Welcome to CivicSky</h2>
        <p>Your new-tab regulatory weather forecast. Select your state to see policies that matter to you.</p>
        <select id="onboarding-state"></select>
        <button id="onboarding-start">Get Started</button>
      </div>
    </div>
  </div>

  <script src="js/weather-engine.js"></script>
  <script src="js/policy-data.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/forecast.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
