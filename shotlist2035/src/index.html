<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShotList 2035 — AI Director of Photography</title>
  <style>
    :root{--bg:#0a0a14;--card:#141428;--text:#e8e8f0;--dim:#7878aa;--accent:#c471ed;--gold:#feca57;--green:#55efc4;--radius:14px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:Georgia,serif;max-width:640px;margin:0 auto;padding:20px;min-height:100vh;}
    h1{text-align:center;font-size:28px;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
    .sub{text-align:center;font-size:12px;color:var(--dim);margin-bottom:20px;}
    .card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid #222244;}
    h2{font-size:18px;color:var(--accent);margin-bottom:10px;}
    h3{font-size:15px;color:var(--dim);margin:14px 0 8px;}
    label{font-size:12px;color:var(--dim);display:block;margin-bottom:4px;}
    .style-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
    .style-btn{background:var(--card);border:1px solid #333;color:var(--dim);font-size:12px;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:inherit;}
    .style-btn.active{border-color:var(--accent);color:var(--text);background:rgba(196,113,237,0.15);}
    select,input[type=number]{background:#0a0a14;border:1px solid #333;color:var(--text);padding:8px;border-radius:8px;font-family:inherit;font-size:14px;width:100%;margin-bottom:10px;}
    .btn{width:100%;padding:14px;border:none;border-radius:var(--radius);font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),#6c5ce7);color:white;margin-bottom:16px;}
    .btn:hover{opacity:0.9;}
    .shot-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border-left:3px solid var(--accent);}
    .shot-rank{font-size:11px;color:var(--dim);float:right;}
    .shot-title{font-size:16px;font-weight:700;margin-bottom:4px;}
    .shot-style{font-size:12px;color:var(--gold);margin-bottom:4px;}
    .shot-desc{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:6px;}
    .shot-meta{font-size:11px;color:var(--dim);display:flex;gap:12px;flex-wrap:wrap;}
    .shot-meta span{display:inline-block;}
    .viral{color:var(--green);font-weight:600;}
    .ai-note{font-size:11px;color:var(--accent);font-style:italic;margin-top:6px;}
    .summary{background:var(--card);border-radius:var(--radius);padding:16px;white-space:pre-line;font-size:12px;line-height:1.6;margin-top:16px;}
    .trend-bar{display:inline-block;width:60px;height:8px;background:#222;border-radius:4px;overflow:hidden;vertical-align:middle;}
    .trend-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:4px;}
  </style>
</head>
<body>
  <h1>🎬 ShotList 2035</h1>
  <p class="sub">AI Director of Photography v12.0 — Personalized shot lists from trending visual styles</p>

  <div class="card">
    <h2>Configure Your Session</h2>
    <label>Select Visual Styles (click to toggle)</label>
    <div class="style-grid" id="style-grid"></div>
    <label>Skill Level</label>
    <select id="skill-select"></select>
    <label>Number of Shots</label>
    <input type="number" id="shot-count" value="8" min="1" max="20">
    <button class="btn" id="btn-generate">Generate Shot List 🎬</button>
  </div>

  <div id="results" style="display:none;">
    <h2>Your Shot List</h2>
    <div id="shot-list"></div>
    <div class="summary" id="summary-text"></div>
  </div>

  <script src="engine.js"></script>
  <script>
    const selectedStyles = new Set();
    const grid = document.getElementById('style-grid');
    VISUAL_STYLES.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'style-btn';
      btn.textContent = s.icon + ' ' + s.name + ' (' + s.trend + '%)';
      btn.onclick = () => {
        if (selectedStyles.has(s.id)) { selectedStyles.delete(s.id); btn.classList.remove('active'); }
        else { selectedStyles.add(s.id); btn.classList.add('active'); }
      };
      grid.appendChild(btn);
    });

    const sel = document.getElementById('skill-select');
    SKILL_LEVELS.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; sel.appendChild(o); });
    sel.value = 'intermediate';

    document.getElementById('btn-generate').onclick = () => {
      const prefs = { styles: [...selectedStyles], skillLevel: sel.value, count: parseInt(document.getElementById('shot-count').value) || 8 };
      const shots = generateShotList(prefs, Date.now());
      renderShots(shots);
    };

    function renderShots(shots) {
      document.getElementById('results').style.display = 'block';
      const list = document.getElementById('shot-list');
      list.innerHTML = '';
      shots.forEach(s => {
        const card = document.createElement('div');
        card.className = 'shot-card';
        card.innerHTML = `
          <div class="shot-rank">#${s.rank}</div>
          <div class="shot-title">${s.styleIcon} ${s.title}</div>
          <div class="shot-style">${s.styleName} — Difficulty: ${'★'.repeat(s.difficulty)}${'☆'.repeat(4-s.difficulty)}</div>
          <div class="shot-desc">${s.description}</div>
          <div class="shot-meta">
            <span>📷 ${s.gear}</span>
            <span class="viral">Viral: ${s.viralPotential}%</span>
            <span>Trend: <span class="trend-bar"><span class="trend-fill" style="width:${s.trendScore}%"></span></span> ${s.trendScore}%</span>
          </div>
          <div class="ai-note">🤖 ${s.aiNote}</div>`;
        list.appendChild(card);
      });
      document.getElementById('summary-text').textContent = getShotListSummary(shots);
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
