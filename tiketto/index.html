<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src https://fonts.gstatic.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com">
  <title>🎫 tiketto — チケットコレクション</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">🎫</span>
        <span class="logo-text">tiketto</span>
      </div>
      <div class="sidebar-nav">
        <button class="nav-btn active" data-view="collection">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          コレクション
        </button>
        <button class="nav-btn" data-view="stats">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
          統計
        </button>
        <button class="nav-btn" data-view="timeline">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          タイムライン
        </button>
      </div>
      <div class="sidebar-footer">
        <button id="btn-import" class="sidebar-action" title="データ読込">📥 読込</button>
        <button id="btn-export" class="sidebar-action" title="データ書出">📤 書出</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="content">
      <!-- Header Bar -->
      <header id="header">
        <div class="header-title">
          <h1 id="view-title">コレクション</h1>
          <span id="ticket-count" class="badge">0枚</span>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="search-input" placeholder="アーティスト、会場で検索...">
          </div>
          <select id="sort-select">
            <option value="date-desc">日付 (新しい順)</option>
            <option value="date-asc">日付 (古い順)</option>
            <option value="artist">アーティスト名</option>
            <option value="venue">会場</option>
          </select>
          <button id="btn-add" class="btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            チケット追加
          </button>
        </div>
      </header>

      <!-- Views -->
      <div id="view-collection" class="view active">
        <div id="ticket-grid" class="ticket-grid"></div>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">🎫</div>
          <h2>まだチケットがありません</h2>
          <p>「チケット追加」ボタンから最初の一枚を記録しましょう</p>
        </div>
      </div>

      <div id="view-stats" class="view">
        <div class="stats-grid" id="stats-container"></div>
      </div>

      <div id="view-timeline" class="view">
        <div id="timeline-container" class="timeline"></div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">チケット追加</h2>
        <button id="btn-close-modal" class="modal-close">&times;</button>
      </div>
      <form id="ticket-form">
        <div class="form-row">
          <div class="form-field">
            <label>アーティスト / 出演者 <span class="required">*</span></label>
            <input type="text" id="f-artist" required placeholder="例: YOASOBI">
          </div>
          <div class="form-field">
            <label>公演名 / ツアー名</label>
            <input type="text" id="f-tour" placeholder="例: ARENA TOUR 2026">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>会場 <span class="required">*</span></label>
            <input type="text" id="f-venue" required placeholder="例: 東京ドーム">
          </div>
          <div class="form-field">
            <label>日付 <span class="required">*</span></label>
            <input type="date" id="f-date" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>座席</label>
            <input type="text" id="f-seat" placeholder="例: アリーナA3ブロック 15列 20番">
          </div>
          <div class="form-field">
            <label>チケット番号</label>
            <input type="text" id="f-number" placeholder="例: A-12345">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>評価</label>
            <div class="star-rating" id="f-rating">
              <span class="star" data-value="1">★</span>
              <span class="star" data-value="2">★</span>
              <span class="star" data-value="3">★</span>
              <span class="star" data-value="4">★</span>
              <span class="star" data-value="5">★</span>
            </div>
          </div>
          <div class="form-field">
            <label>カラー</label>
            <div class="color-picker" id="f-color">
              <span class="color-swatch active" data-color="#ff6b6b" style="background:#ff6b6b"></span>
              <span class="color-swatch" data-color="#ffa94d" style="background:#ffa94d"></span>
              <span class="color-swatch" data-color="#ffd43b" style="background:#ffd43b"></span>
              <span class="color-swatch" data-color="#69db7c" style="background:#69db7c"></span>
              <span class="color-swatch" data-color="#4dabf7" style="background:#4dabf7"></span>
              <span class="color-swatch" data-color="#9775fa" style="background:#9775fa"></span>
              <span class="color-swatch" data-color="#f783ac" style="background:#f783ac"></span>
              <span class="color-swatch" data-color="#e8e8e8" style="background:#e8e8e8"></span>
            </div>
          </div>
        </div>
        <div class="form-field">
          <label>メモ</label>
          <textarea id="f-memo" rows="3" placeholder="感想、セトリ、思い出など..."></textarea>
        </div>
        <input type="hidden" id="f-id" value="">
        <div class="form-actions">
          <button type="button" id="btn-delete-ticket" class="btn-danger hidden">削除</button>
          <div class="form-actions-right">
            <button type="button" id="btn-cancel" class="btn-secondary">キャンセル</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
