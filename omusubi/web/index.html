<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍙 おむすび — 遠距離カップル食事共有</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="mascot-small">🍙</div>
      <h1>おむすび</h1>
      <p class="subtitle">遠距離カップル食事共有</p>
    </header>

    <!-- Mascot Area -->
    <div id="mascot-area" class="card mascot-card">
      <div class="mascot-face" id="mascot-face">😊</div>
      <p id="mascot-message">今日も一緒にごはんしようね！</p>
      <div id="streak-badge" class="streak-badge">
        <span id="streak-count">0</span>日連続 一緒にごはん 🔥
      </div>
    </div>

    <!-- Meal Input -->
    <div class="card">
      <h2>🍽️ ごはんを記録</h2>
      <div class="input-row">
        <div class="person-toggle">
          <button class="person-btn active" data-person="A" id="btn-person-a">わたし</button>
          <button class="person-btn" data-person="B" id="btn-person-b">あなた</button>
        </div>
      </div>
      <div class="input-row">
        <input type="text" id="food-input" placeholder="何食べた？（例: カレーライス）" />
        <button id="btn-log" class="btn-primary">記録</button>
      </div>
    </div>

    <!-- Today's Meals -->
    <div class="card">
      <h2>📋 今日のごはん</h2>
      <div class="meals-split">
        <div class="meals-column">
          <h3 class="person-a">🧑 わたし</h3>
          <div id="meals-a"></div>
        </div>
        <div class="meals-divider"></div>
        <div class="meals-column">
          <h3 class="person-b">👤 あなた</h3>
          <div id="meals-b"></div>
        </div>
      </div>
      <div id="together-meals"></div>
    </div>

    <!-- Recipe Suggestion -->
    <div class="card">
      <h2>👨‍🍳 今日のおすすめ</h2>
      <div id="recipe-area"></div>
    </div>

    <!-- Stats -->
    <div class="card">
      <h2>📊 ふたりの記録</h2>
      <div class="stats-row">
        <div class="stat"><span id="stat-total" class="stat-num">0</span><span class="stat-label">食</span></div>
        <div class="stat"><span id="stat-together" class="stat-num">0</span><span class="stat-label">一緒</span></div>
        <div class="stat"><span id="stat-streak" class="stat-num">0</span><span class="stat-label">連続</span></div>
      </div>
      <div id="food-ranking"></div>
    </div>

    <footer>🍙 おむすび — Dart + Web</footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
