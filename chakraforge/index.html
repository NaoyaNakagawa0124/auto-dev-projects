<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChakraForge - Anime Energy Effect Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
            cursor: crosshair;
        }

        canvas { display: block; }

        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #title-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }
        #title-bar h1 {
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4444, #ffaa00, #00ddaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 4px;
        }
        #rank-display {
            font-size: 12px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        #technique-bar {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
            pointer-events: auto;
        }
        .tech-btn {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            border: 2px solid #333;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .tech-btn.active {
            border-color: var(--tech-color, #fff);
            box-shadow: 0 0 20px var(--tech-color, #fff);
        }
        .tech-btn.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .tech-btn .icon { font-size: 20px; }
        .tech-btn .key {
            font-size: 9px;
            color: #666;
            font-family: 'Orbitron', monospace;
        }

        #xp-bar-container {
            position: fixed;
            bottom: 92px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            z-index: 20;
        }
        #xp-bar-bg {
            width: 100%;
            height: 4px;
            background: #1a1a2e;
            border-radius: 2px;
            overflow: hidden;
        }
        #xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ffaa00);
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        #xp-label {
            font-size: 10px;
            color: #555;
            text-align: center;
            margin-top: 4px;
            font-family: 'Orbitron', monospace;
        }

        #controls-hint {
            position: fixed;
            top: 16px;
            right: 16px;
            font-size: 11px;
            color: #444;
            text-align: right;
            z-index: 20;
            pointer-events: none;
            line-height: 1.8;
        }

        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 900;
            color: white;
            text-align: center;
            z-index: 30;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #notification.show {
            opacity: 1;
            animation: notifyPulse 2s ease-out forwards;
        }
        @keyframes notifyPulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        #intensity-display {
            position: fixed;
            left: 16px;
            bottom: 24px;
            z-index: 20;
            pointer-events: none;
        }
        #intensity-display span {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>
    <div id="title-bar">
        <h1>CHAKRAFORGE</h1>
        <div id="rank-display">Apprentice</div>
    </div>

    <div id="controls-hint">
        [1-5] Techniques<br>
        [S] Save PNG<br>
        [Space] Pause<br>
        [Scroll] Intensity
    </div>

    <div id="technique-bar"></div>

    <div id="xp-bar-container">
        <div id="xp-bar-bg"><div id="xp-bar-fill" style="width: 0%"></div></div>
        <div id="xp-label">0 / 10 XP</div>
    </div>

    <div id="notification"></div>

    <div id="intensity-display">
        <span>Intensity: <span id="intensity-value">50</span>%</span>
    </div>

    <script src="sketch.js"></script>
</body>
</html>
