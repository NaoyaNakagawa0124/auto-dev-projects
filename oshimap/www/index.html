<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推しマップ — 推しの活動を地図で追え</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🗺️ 推しマップ</h1>
      <div id="stats-bar">
        <span id="stat-events">0イベント</span>
        <span id="stat-prefectures">0都道府県</span>
        <span id="stat-coverage">0%征服</span>
        <span id="stat-distance">0km</span>
      </div>
    </header>
    <div id="main">
      <div id="map-area">
        <canvas id="map-canvas" width="600" height="700"></canvas>
      </div>
      <div id="panel">
        <h2>📍 イベント追加</h2>
        <div class="form-group">
          <label>都道府県</label>
          <select id="pref-select"></select>
        </div>
        <div class="form-group">
          <label>イベント名</label>
          <input type="text" id="event-title" placeholder="例: 全国ツアー東京公演" />
        </div>
        <div class="form-group">
          <label>日付</label>
          <input type="date" id="event-date" />
        </div>
        <div class="form-group">
          <label>種類</label>
          <select id="event-type">
            <option value="concert">🎵 ライブ</option>
            <option value="event">🎪 イベント</option>
            <option value="pilgrimage">⛩️ 聖地巡礼</option>
            <option value="other">📝 その他</option>
          </select>
        </div>
        <div class="form-group">
          <label>メモ</label>
          <input type="text" id="event-note" placeholder="感想など" />
        </div>
        <button id="add-btn" class="btn-primary">追加する</button>

        <h2 style="margin-top: 16px;">📋 イベント一覧</h2>
        <div id="event-list"></div>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
