<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>映画道 - Eigamichi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

:root {
  --bg: #0c0c1a;
  --card: rgba(20,20,40,0.9);
  --card-border: rgba(255,255,255,0.08);
  --text: #e8e4f0;
  --text-dim: #8a8598;
  --accent: #b48efa;
  --accent2: #fa8eb4;
  --gold: #ffd700;
  --shadow: rgba(0,0,0,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Background ─────────────────────────────── */
.bg-gradient {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(180,142,250,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(250,142,180,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(100,180,250,0.05) 0%, transparent 50%),
    var(--bg);
  z-index: -1;
}

/* ─── Container ──────────────────────────────── */
.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── Header ─────────────────────────────────── */
.header {
  text-align: center;
  padding: 30px 0 20px;
}

.header h1 {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 4px;
}

.header .sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ─── Progress Path ──────────────────────────── */
.path-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  margin-bottom: 16px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;
  overflow-x: auto;
  flex-wrap: wrap;
}

.path-node {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  background: rgba(180,142,250,0.15);
  color: var(--accent);
  white-space: nowrap;
}

.path-arrow {
  color: var(--text-dim);
  font-size: 10px;
}

/* ─── Scene (VN-style) ───────────────────────── */
.scene {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.scene-text {
  font-size: 20px;
  font-weight: 500;
  text-align: center;
  margin-bottom: 8px;
  line-height: 1.5;
}

.scene-hint {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 28px;
}

/* ─── Choices ────────────────────────────────── */
.choices {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.choice-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border: 1px solid var(--card-border);
  border-radius: 14px;
  background: var(--card);
  color: var(--text);
  font-family: inherit;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: left;
  backdrop-filter: blur(10px);
}

.choice-btn:hover {
  border-color: var(--accent);
  background: rgba(180,142,250,0.1);
  transform: translateX(6px);
  box-shadow: 0 4px 20px rgba(180,142,250,0.15);
}

.choice-btn .emoji {
  font-size: 24px;
  flex-shrink: 0;
}

.choice-btn .label {
  font-weight: 500;
}

.choice-btn .desc {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ─── Result Card ────────────────────────────── */
.result {
  animation: fadeIn 0.6s ease;
}

.movie-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 28px;
  text-align: center;
  margin-bottom: 16px;
  backdrop-filter: blur(10px);
}

.movie-genre {
  font-size: 12px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.movie-title {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 4px;
}

.movie-original {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.movie-meta {
  display: flex;
  justify-content: center;
  gap: 16px;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.movie-meta span { display: flex; align-items: center; gap: 4px; }

.movie-desc {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  text-align: left;
  border-top: 1px solid var(--card-border);
  padding-top: 16px;
}

.movie-rating {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,215,0,0.15);
  color: var(--gold);
  padding: 4px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 16px;
}

/* ─── Path Tree ──────────────────────────────── */
.path-tree {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 16px;
}

.path-tree h3 {
  font-size: 14px;
  color: var(--accent);
  margin-bottom: 12px;
  text-align: center;
}

.tree-steps {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.tree-step {
  display: flex;
  align-items: center;
  gap: 10px;
}

.tree-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  position: relative;
}

.tree-dot::after {
  content: '';
  position: absolute;
  left: 5px;
  top: 12px;
  width: 2px;
  height: 20px;
  background: rgba(180,142,250,0.3);
}

.tree-step:last-child .tree-dot::after { display: none; }
.tree-step:last-child .tree-dot {
  background: var(--gold);
  box-shadow: 0 0 10px rgba(255,215,0,0.4);
}

.tree-label {
  font-size: 13px;
  color: var(--text-dim);
}

/* ─── Buttons ────────────────────────────────── */
.action-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 10px;
}

.btn {
  padding: 10px 24px;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  background: var(--card);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
}

.btn:hover {
  border-color: var(--accent);
  background: rgba(180,142,250,0.1);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  color: white;
  font-weight: 700;
}

.btn-primary:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
}

/* ─── Title Screen ───────────────────────────── */
.title-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  animation: fadeIn 0.8s ease;
}

.title-screen .big-icon { font-size: 64px; margin-bottom: 16px; }

.title-screen h1 {
  font-size: 42px;
  background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 6px;
  margin-bottom: 8px;
}

.title-screen .tagline {
  font-size: 16px;
  color: var(--text-dim);
  margin-bottom: 40px;
}

.title-screen .start-hint {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 16px;
}

/* ─── Stats ──────────────────────────────────── */
.stats-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 20px;
}

.stat-item {
  text-align: center;
}

.stat-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}

.stat-label {
  font-size: 10px;
  color: var(--text-dim);
}

/* ─── Footer ─────────────────────────────────── */
.footer {
  text-align: center;
  padding: 20px 0;
  font-size: 10px;
  color: var(--text-dim);
}
</style>
</head>

// ─── State ─────────────────────────────────────────
let currentNode = null;
let path = [];        // [{nodeId, choiceLabel}]
let totalPaths = 0;   // from localStorage
let favoriteGenres = {};

function loadStats() {
  try {
    const saved = JSON.parse(localStorage.getItem('eigamichi-stats') || '{}');
    totalPaths = saved.totalPaths || 0;
    favoriteGenres = saved.favoriteGenres || {};
  } catch(e) {}
}

function saveStats() {
  localStorage.setItem('eigamichi-stats', JSON.stringify({ totalPaths, favoriteGenres }));
}

// ─── Rendering ─────────────────────────────────────
const app = document.getElementById('app');

function render() {
  if (!currentNode) {
    renderTitle();
  } else {
    const node = tree[currentNode];
    if (node.movie) {
      renderResult(node.movie);
    } else {
      renderScene(node);
    }
  }
}

function renderTitle() {
  loadStats();
  app.innerHTML = `
    <div class="title-screen">
      <div class="big-icon">🎬</div>
      <h1>映 画 道</h1>
      <p class="tagline">あなたの気分が導く、映画との出会い</p>
      ${totalPaths > 0 ? `
        <div class="stats-row">
          <div class="stat-item"><div class="stat-num">${totalPaths}</div><div class="stat-label">たどった道</div></div>
          <div class="stat-item"><div class="stat-num">${Object.keys(favoriteGenres).length}</div><div class="stat-label">出会ったジャンル</div></div>
        </div>
      ` : ''}
      <button class="btn btn-primary" onclick="startJourney()">映画道を歩む</button>
      <p class="start-hint">選択肢を選んで、あなたにぴったりの映画を見つけよう</p>
    </div>
  `;
}

function renderScene(node) {
  const pathHtml = path.length > 0 ? `
    <div class="path-bar">
      ${path.map((p, i) => `
        <span class="path-node">${p.choiceLabel}</span>
        ${i < path.length - 1 ? '<span class="path-arrow">→</span>' : ''}
      `).join('')}
    </div>
  ` : '';

  app.innerHTML = `
    <div class="header">
      <h1>映画道</h1>
      <div class="sub">ステップ ${path.length + 1}</div>
    </div>
    ${pathHtml}
    <div class="scene" key="${currentNode}">
      <p class="scene-text">${node.text}</p>
      ${node.hint ? `<p class="scene-hint">${node.hint}</p>` : ''}
      <div class="choices">
        ${node.choices.map((c, i) => `
          <button class="choice-btn" onclick="choose('${c.next}', '${c.label.replace(/'/g, "\\'")}')">
            <span class="emoji">${c.emoji}</span>
            <div>
              <div class="label">${c.label}</div>
              ${c.desc ? `<div class="desc">${c.desc}</div>` : ''}
            </div>
          </button>
        `).join('')}
      </div>
    </div>
    <div class="action-row" style="margin-top:20px">
      ${path.length > 0 ? `<button class="btn" onclick="goBack()">← 戻る</button>` : ''}
      <button class="btn" onclick="resetJourney()">最初から</button>
    </div>
  `;

  // Re-trigger animation
  const scene = app.querySelector('.scene');
  scene.style.animation = 'none';
  scene.offsetHeight;
  scene.style.animation = '';
}

function renderResult(movie) {
  totalPaths++;
  const genre = movie.genre.split(' / ')[0];
  favoriteGenres[genre] = (favoriteGenres[genre] || 0) + 1;
  saveStats();

  const starsHtml = '★'.repeat(Math.round(movie.rating / 2)) + '☆'.repeat(5 - Math.round(movie.rating / 2));

  app.innerHTML = `
    <div class="header">
      <h1>映画道</h1>
      <div class="sub">あなたの道が導いた一作</div>
    </div>
    <div class="result">
      <div class="movie-card">
        <div class="movie-genre">${movie.genre}</div>
        <div class="movie-title">${movie.title}</div>
        <div class="movie-original">${movie.original}</div>
        <div class="movie-rating">${starsHtml} ${movie.rating}</div>
        <div class="movie-meta">
          <span>📅 ${movie.year}</span>
          <span>🎬 ${movie.director}</span>
        </div>
        <div class="movie-desc">${movie.desc}</div>
      </div>

      <div class="path-tree">
        <h3>🌿 あなたの映画道</h3>
        <div class="tree-steps">
          ${path.map((p, i) => `
            <div class="tree-step">
              <div class="tree-dot"></div>
              <span class="tree-label">${p.choiceLabel}</span>
            </div>
          `).join('')}
          <div class="tree-step">
            <div class="tree-dot"></div>
            <span class="tree-label" style="color:var(--gold);font-weight:700">${movie.title}</span>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-primary" onclick="resetJourney()">もう一度歩む</button>
        <button class="btn" onclick="goHome()">タイトルへ</button>
      </div>
    </div>
  `;
}

// ─── Actions ───────────────────────────────────────
function startJourney() {
  currentNode = 'root';
  path = [];
  render();
}

function choose(nextNode, label) {
  path.push({ nodeId: currentNode, choiceLabel: label });
  currentNode = nextNode;
  render();
}

function goBack() {
  if (path.length > 0) {
    const prev = path.pop();
    currentNode = prev.nodeId;
    render();
  }
}

function resetJourney() {
  currentNode = 'root';
  path = [];
  render();
}

function goHome() {
  currentNode = null;
  path = [];
  render();
}

// ─── Init ──────────────────────────────────────────
render();
</script>
</body>
</html>
